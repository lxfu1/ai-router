name: Security

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # 每周一运行
    - cron: '0 0 * * 1'

jobs:
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: |
          npm audit --audit-level=moderate || true
          # 使用 || true 确保不会阻塞 PR，但会显示警告
          # 生产环境部署前应该修复所有漏洞

      - name: Check for hardcoded secrets (basic)
        run: |
          # 检查常见的密钥模式
          ERRORS=0
          
          # 检查 sk- 开头的密钥（排除示例和文档）
          if grep -r "sk-[a-zA-Z0-9]\{20,\}" --include="*.ts" --include="*.js" --include="*.mjs" . | grep -v "\.example" | grep -v "your-" | grep -v "process\.env"; then
            echo "❌ 发现可能的硬编码 API Key"
            ERRORS=$((ERRORS + 1))
          fi
          
          # 检查 GitHub Token 模式
          if grep -r "ghp_[a-zA-Z0-9]\{36,\}" --include="*.ts" --include="*.js" .; then
            echo "❌ 发现可能的硬编码 GitHub Token"
            ERRORS=$((ERRORS + 1))
          fi
          
          # 检查 AWS 密钥
          if grep -r "AKIA[0-9A-Z]\{16\}" --include="*.ts" --include="*.js" .; then
            echo "❌ 发现可能的硬编码 AWS Access Key"
            ERRORS=$((ERRORS + 1))
          fi
          
          # 检查私钥
          if grep -r "BEGIN PRIVATE KEY" --include="*.ts" --include="*.js" --include="*.pem" .; then
            echo "❌ 发现可能的硬编码私钥"
            ERRORS=$((ERRORS + 1))
          fi
          
          if [ $ERRORS -gt 0 ]; then
            echo "发现 $ERRORS 个潜在安全问题，请检查上述输出"
            exit 1
          fi
          
          echo "✅ 基础密钥扫描通过"

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3