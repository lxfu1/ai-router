name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          DEEPSEEK_API_KEY: dummy
          ZHIPU_API_KEY: dummy
          QWEN_API_KEY: dummy
          ADMIN_PASSWORD: dummy
          JWT_SECRET: dummy
