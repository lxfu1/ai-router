name: Bug 报告
description: 创建报告以帮助我们改进
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的 Bug 报告！请填写以下信息帮助我们快速定位问题。

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 清晰简洁地描述 Bug
      placeholder: 发生了什么？
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 如何复现这个问题？
      placeholder: |
        1. 启动服务 '...'
        2. 调用 API '...'
        3. 出现错误
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 你期望发生什么？
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 实际发生了什么？
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 日志/错误信息
      description: 如果有错误日志请粘贴
      render: shell

  - type: input
    id: version
    attributes:
      label: 版本
      description: 使用的 ai-router 版本
      placeholder: v1.0.0
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: 部署方式
      options:
        - Docker
        - Docker Compose
        - 本地开发
        - 其他
    validations:
      required: true

  - type: textarea
    id: env
    attributes:
      label: 环境信息
      description: |
        - Node.js 版本: 
        - 操作系统: 
        - 数据库类型 (SQLite/PostgreSQL): 
      render: markdown

  - type: checkboxes
    id: checklist
    attributes:
      label: 自检清单
      options:
        - label: 已确认不是上游 API 的问题
        - label: 已搜索现有 issue，未找到相同问题
        - label: 使用的是最新版本